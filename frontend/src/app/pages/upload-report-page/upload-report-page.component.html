<div class="card">
  <h2>Upload Medical Report</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Patient Username</label>
      <input [(ngModel)]="patientUsername" name="patientUsername" placeholder="e.g. patient1" required>
    </div>
    <div class="form-group">
      <label>Report Title</label>
      <input [(ngModel)]="title" name="title" required>
    </div>
    <div class="form-group">
      <label>Secret Key</label>
      <input [(ngModel)]="secretKey" name="secretKey" required>
    </div>
    <div class="form-group">
      <label>Report File (text)</label>
      <input type="file" (change)="onFileSelected($event)" required>
    </div>
    <button type="submit">Upload &amp; Encrypt</button>
  </form>
  <p style="margin-top: 8px;">{{ message }}</p>
</div>
