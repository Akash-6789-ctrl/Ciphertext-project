<div class="card">
  <h2>View Reports</h2>
  <p>{{ message }}</p>
  <table *ngIf="reports.length">
    <thead>
    <tr>
      <th>ID</th>
      <th>Title</th>
      <th>Filename</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let r of reports">
      <td>{{ r.id }}</td>
      <td>{{ r.title }}</td>
      <td>{{ r.originalFilename }}</td>
    </tr>
    </tbody>
  </table>
</div>
