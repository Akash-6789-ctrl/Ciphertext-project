<div class="card">
  <h2>Decrypt Medical Report</h2>
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Report ID</label>
      <input type="number" [(ngModel)]="reportId" name="reportId" required>
    </div>
    <div class="form-group">
      <label>Secret Key</label>
      <input [(ngModel)]="secretKey" name="secretKey" required>
    </div>
    <button type="submit">Decrypt</button>
  </form>
  <p style="margin-top: 8px;">{{ message }}</p>
  <div *ngIf="decryptedContent">
    <h3>Decrypted Content</h3>
    <pre>{{ decryptedContent }}</pre>
  </div>
</div>
